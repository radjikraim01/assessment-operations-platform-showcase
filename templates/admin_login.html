<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Assessment Operations Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Saira+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* AOP Design System Variables */
        :root {
            --petroleum-navy: #0a1628;
            --deep-ocean: #132032;
            --steel-gray: #1f2937;
            --amber-warning: #f59e0b;
            --copper-accent: #ea580c;
            --safety-green: #10b981;
            --danger-red: #dc2626;
            --technical-cyan: #06b6d4;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-subtle: #334155;
            --border-bright: #475569;
            --gradient-amber: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--petroleum-navy);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--deep-ocean);
            border: 2px solid var(--border-bright);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .login-logo {
            font-family: 'Saira Condensed', sans-serif;
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 3px;
            text-align: center;
            background: var(--gradient-amber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--petroleum-navy);
            border: 2px solid var(--border-bright);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--amber-warning);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--technical-cyan), var(--amber-warning));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(14, 165, 233, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.2);
            border-left: 4px solid var(--danger-red);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            color: var(--danger-red);
            font-size: 14px;
            display: none;
        }

        .spinner {
            border: 3px solid var(--border-bright);
            border-top: 3px solid var(--amber-warning);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-badge {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--technical-cyan);
            border-radius: 8px;
            padding: 12px;
            margin-top: 24px;
            font-size: 12px;
            color: var(--technical-cyan);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">AOP</div>
        <div class="login-subtitle">Administrator Login</div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">
                    <i class="bi bi-envelope"></i> Email Address
                </label>
                <input
                    type="email"
                    id="email"
                    class="form-input"
                    placeholder="admin@example.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">
                    <i class="bi bi-lock"></i> Password
                </label>
                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginBtnText">Login</span>
            </button>
        </form>

        <div class="info-badge">
            <i class="bi bi-shield-lock"></i> B2B Authorization Dashboard Access
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const errorMsg = document.getElementById('errorMessage');

            // Hide previous errors
            errorMsg.style.display = 'none';

            // Disable button and show loading
            btn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success - redirect to dashboard
                    window.location.href = '/dashboard/b2b-authorizations';
                } else {
                    // Show error
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btnText.textContent = 'Login';
                }
            } catch (error) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btnText.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
